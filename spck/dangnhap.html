<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicCloud - Đăng Nhập</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <!-- LEFT: Intro -->
        <div class="auth-intro">
            <div class="intro-content">
                <div class="logo-intro">
                    <i class="fas fa-music"></i>
                    <h1>ChillBeatz</h1>
                </div>
                <h2>Cảm Nhận Âm Nhạc</h2>
                <p>Khám phá hàng triệu bài hát từ những nghệ sĩ yêu thích của bạn</p>
                <div class="features">
                    <div class="feature-item">
                        <i class="fas fa-play-circle"></i>
                        <span>Nghe Nhạc Không Giới Hạn</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-heart"></i>
                        <span>Tạo Danh Sách Yêu Thích</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-share-alt"></i>
                        <span>Chia Sẻ Với Bạn Bè</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Login Form -->
        <div class="auth-form-container">
            <div class="auth-form">
                <h2>Đăng Nhập</h2>
                <p class="form-subtitle">Chào mừng trở lại với ChillBeatz</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật Khẩu</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span>Ghi nhớ tôi</span>
                        </label>
                        <a href="#" class="forgot-password">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-submit">Đăng Nhập</button>
                </form>

                <div class="divider">
                    <span>HOẶC</span>
                </div>

                <div class="social-login">
                    <button type="button" class="btn-social btn-google">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-social btn-facebook">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>

                <p class="form-footer">
                    Chưa có tài khoản? <a href="dangki.html">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
