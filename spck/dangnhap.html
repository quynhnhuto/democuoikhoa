<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChillBeatz - Đăng Nhập</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="register-box">
        <h2>Đăng Nhập</h2>
        <form id="registerForm" onsubmit="return validateForm()">
            <input type="email" id="email" name="email" placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Mật khẩu" required>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Xác nhận mật khẩu" required>
            <button type="submit">Đăng Nhập</button>
        </form>
        <p class="form-footer">Chưa có tài khoản? <a href="dangki.html">Đăng kí</a></p>
    </div>

    <footer>© 2026 ChillBeatz</footer>

    <script src="register.js"></script>
</body>

</html>
